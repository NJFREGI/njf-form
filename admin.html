<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NJFREGI管理页面</title>
  <style>
    :root{
      --bg:#f3f3f1;
      --paper:#ffffff;
      --ink:#222;
      --sub:#666;
      --line:#d2d2cc;
      --line-dark:#b9b9b2;
      --brand:#1389d4;
      --brand-dark:#0c6da8;
      --soft:#f8f8f5;
      --ok:#0d7a43;
      --warn:#b42318;
      --shadow:0 6px 20px rgba(0,0,0,.06);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP","PingFang SC","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink)}
    .wrap{max-width:1100px;margin:0 auto;padding:20px 14px 40px}
    .hero,.section{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
    }
    .hero{
      padding:26px 20px;
      margin-bottom:16px;
    }
    .admin-hero-center{
      text-align:center;
    }
    .admin-hero-center h1{
      margin:0;
      font-size:28px;
      font-weight:800;
      letter-spacing:.04em;
    }

    .section{padding:18px;margin-bottom:16px}
    .section-title{
      margin:0 0 14px;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800
    }
    .section-title::before{
      content:"";
      width:5px;
      height:20px;
      border-radius:999px;
      background:var(--brand)
    }

    .grid{display:grid;gap:12px}
    .grid.two{grid-template-columns:1fr}

    label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:#555;
      font-weight:700
    }

    input,button{
      width:100%;
      padding:11px 12px;
      border-radius:10px;
      border:1px solid var(--line);
      font-size:14px;
      font-family:inherit;
      background:#fff;
      color:#222
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap
    }

    .btn{
      width:auto;
      min-width:140px;
      border:none;
      background:var(--brand);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(19,137,212,.20)
    }
    .btn:hover{background:var(--brand-dark)}

    .btn.secondary{
      background:#f0f0ec;
      color:#333;
      border:1px solid var(--line);
      box-shadow:none
    }

    .subnote{
      font-size:13px;
      color:var(--sub);
      margin:-4px 0 10px
    }

    .result-box{
      border:1px dashed var(--line-dark);
      background:var(--soft);
      padding:14px;
      border-radius:12px
    }

    .link-box{
      word-break:break-all;
      background:#fff;
      border:1px solid var(--line);
      border-radius:10px;
      padding:12px;
      font-size:13px;
      line-height:1.7
    }

    .status{
      font-size:13px;
      margin-top:10px
    }
    .status.ok{color:var(--ok)}
    .status.warn{color:var(--warn)}

    .preview{
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      background:#fcfcfa;
      font-size:14px;
      line-height:1.8
    }
    .preview strong{
      display:inline-block;
      min-width:110px
    }

    .device-list{
      display:grid;
      gap:12px;
    }

    .device-card{
      border:1px solid var(--line);
      background:#fcfcfa;
      border-radius:14px;
      padding:12px;
    }

    .device-card .row{
      display:grid;
      gap:10px;
      margin-bottom:10px;
    }

    .device-card .row:last-child{
      margin-bottom:0;
    }

    .small-btn{
      width:auto;
      padding:9px 12px;
      border-radius:8px;
      border:none;
      background:#efefea;
      cursor:pointer;
    }

    @media (min-width:760px){
      .grid.two{grid-template-columns:1fr 1fr}
      .wrap{padding:24px 18px 44px}
      .device-card .row.two{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="admin-hero-center">
        <h1>NJFREGI管理页面</h1>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">1. 顧客基本情報</h2>
      <div class="grid two">
        <div>
          <label>顧客コード</label>
          <input id="customerCode" placeholder="例: 20260418001">
        </div>
        <div>
          <label>設置先名称</label>
          <input id="installName" placeholder="例: 赤坂麻辣湯">
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">2. 設備・サービス設定</h2>
      <p class="subnote">
        这里设置好设备内容后，点“生成短链接”，数据会保存到 Google Sheets，并返回短链接。
      </p>

      <div class="device-list" id="deviceList"></div>

      <div class="btn-row" style="margin-top:12px;">
        <button type="button" class="btn secondary" id="addRowBtn">＋ 設備を追加</button>
        <button type="button" class="btn secondary" id="loadSampleBtn">サンプル読込</button>
        <button type="button" class="btn secondary" id="clearAllBtn">内容を初期化</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">3. 内容预览</h2>
      <div class="preview" id="previewBox">
        <div><strong>顧客コード：</strong><span id="previewCode">-</span></div>
        <div><strong>設置先名称：</strong><span id="previewShop">-</span></div>
        <div style="margin-top:10px;"><strong>設備内容：</strong></div>
        <div id="previewItems">未设置</div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">4. 短链接生成</h2>
      <div class="btn-row">
        <button type="button" class="btn" id="generateBtn">短链接を生成</button>
        <button type="button" class="btn secondary" id="copyBtn">リンクをコピー</button>
      </div>

      <div class="result-box" style="margin-top:14px;">
        <label>生成结果</label>
        <div class="link-box" id="generatedLink">まだ生成されていません</div>
        <p class="status" id="statusText"></p>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "njf_regi_admin_config_v6";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxc7ilkbZ-NVErnNVEvi4aW4tWrw2qIM6b-iSe_UEz9_2CcjXJYhVtCkS6w57EK13_Z/exec";

    const deviceListEl = document.getElementById("deviceList");
    const customerCodeEl = document.getElementById("customerCode");
    const installNameEl = document.getElementById("installName");
    const generatedLinkEl = document.getElementById("generatedLink");
    const statusTextEl = document.getElementById("statusText");
    const previewCodeEl = document.getElementById("previewCode");
    const previewShopEl = document.getElementById("previewShop");
    const previewItemsEl = document.getElementById("previewItems");

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getFormUrl() {
      return "https://njfregi.github.io/njf-form/form";
    }

    function qtyValid(qty) {
      return Number(qty) > 0;
    }

    function addDeviceCard(name = "", price = "", qty = "1") {
      const card = document.createElement("div");
      card.className = "device-card";
      card.innerHTML = `
        <div class="row">
          <div>
            <label>設備名称</label>
            <input class="device-name" placeholder="例: レシートプリンタ" value="${escapeHtml(name)}">
          </div>
        </div>
        <div class="row two">
          <div>
            <label>単価(¥)</label>
            <input class="device-price" type="number" min="0" placeholder="28000" value="${escapeHtml(price)}">
          </div>
          <div>
            <label>数量</label>
            <input class="device-qty" type="number" min="0" placeholder="1" value="${escapeHtml(qty)}">
          </div>
        </div>
        <div class="row">
          <button type="button" class="small-btn remove-row">この設備を削除</button>
        </div>
      `;

      deviceListEl.appendChild(card);

      const removeBtn = card.querySelector(".remove-row");
      removeBtn.addEventListener("click", () => {
        card.remove();
        updatePreview();
        saveConfig();
      });

      card.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", () => {
          updatePreview();
          saveConfig();
        });
      });
    }

    function collectDevices() {
      const cards = Array.from(deviceListEl.querySelectorAll(".device-card"));
      return cards.map(card => {
        const name = card.querySelector(".device-name").value.trim();
        const price = Number(card.querySelector(".device-price").value || 0);
        const qty = Number(card.querySelector(".device-qty").value || 0);
        return { name, price, qty };
      }).filter(item => item.name && qtyValid(item.qty));
    }

    function updatePreview() {
      previewCodeEl.textContent = customerCodeEl.value.trim() || "-";
      previewShopEl.textContent = installNameEl.value.trim() || "-";

      const items = collectDevices();
      if (!items.length) {
        previewItemsEl.textContent = "未设置";
        return;
      }

      previewItemsEl.innerHTML = items.map(item => {
        return `・${escapeHtml(item.name)} / ¥${Number(item.price).toLocaleString("ja-JP")} / 数量 ${item.qty}`;
      }).join("<br>");
    }

    function saveConfig() {
      const data = {
        customerCode: customerCodeEl.value.trim(),
        installName: installNameEl.value.trim(),
        devices: collectDevices()
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadConfig() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;

      try {
        const data = JSON.parse(raw);
        customerCodeEl.value = data.customerCode || "";
        installNameEl.value = data.installName || "";
        deviceListEl.innerHTML = "";

        if (Array.isArray(data.devices) && data.devices.length) {
          data.devices.forEach(item => addDeviceCard(item.name, item.price, item.qty));
        } else {
          addDeviceCard("NJF POS 本体", "78000", "1");
          addDeviceCard("レシートプリンタ", "28000", "1");
        }
        return true;
      } catch (e) {
        return false;
      }
    }

    function loadSample() {
      deviceListEl.innerHTML = "";
      addDeviceCard("NJF POS 本体", "78000", "1");
      addDeviceCard("キャッシュドロワ", "12000", "1");
      addDeviceCard("レシートプリンタ", "28000", "1");
      addDeviceCard("月額クラウド利用料", "9800", "1");
      addDeviceCard("保守サポート", "5000", "1");
      updatePreview();
      saveConfig();
    }

    function clearAll() {
      customerCodeEl.value = "";
      installNameEl.value = "";
      deviceListEl.innerHTML = "";
      addDeviceCard();
      generatedLinkEl.textContent = "まだ生成されていません";
      showStatus("内容已初始化。", true);
      updatePreview();
      saveConfig();
    }

    function showStatus(text, ok) {
      statusTextEl.textContent = text;
      statusTextEl.className = `status ${ok ? "ok" : "warn"}`;
    }

    async function copyLink() {
      const text = generatedLinkEl.textContent.trim();
      if (!text || text === "まだ生成されていません") {
        showStatus("请先生成链接。", false);
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        showStatus("链接已复制。", true);
      } catch (e) {
        showStatus("复制失败，请手动复制。", false);
      }
    }

    async function generateShortLink() {
      const code = customerCodeEl.value.trim();
      const shop = installNameEl.value.trim();
      const items = collectDevices();

      if (!code) {
        showStatus("请先填写 顧客コード。", false);
        return;
      }
      if (!shop) {
        showStatus("请先填写 設置先名称。", false);
        return;
      }
      if (!items.length) {
        showStatus("请至少添加 1 个设备项目。", false);
        return;
      }

      showStatus("正在保存到 Google Sheets 并生成短链接...", true);

      try {
        const payload = {
          customerCode: code,
          installName: shop,
          items: items
        };

        const formData = new URLSearchParams();
        formData.append("action", "createRecord");
        formData.append("payload", JSON.stringify(payload));

        const res = await fetch(GAS_URL, {
          method: "POST",
          body: formData
        });

        const result = await res.json();

        if (!result.success) {
          throw new Error(result.message || "create failed");
        }

        const shortUrl = `${getFormUrl()}?id=${result.id}`;
        generatedLinkEl.textContent = shortUrl;
        showStatus(`短链接已生成，ID：${result.id}`, true);
      } catch (err) {
        showStatus(`生成失败：${err.message}`, false);
      }
    }

    document.getElementById("addRowBtn").addEventListener("click", () => {
      addDeviceCard();
      updatePreview();
      saveConfig();
    });

    document.getElementById("loadSampleBtn").addEventListener("click", loadSample);
    document.getElementById("clearAllBtn").addEventListener("click", clearAll);
    document.getElementById("copyBtn").addEventListener("click", copyLink);
    document.getElementById("generateBtn").addEventListener("click", generateShortLink);

    [customerCodeEl, installNameEl].forEach(el => {
      el.addEventListener("input", () => {
        updatePreview();
        saveConfig();
      });
    });

    if (!loadConfig()) {
      addDeviceCard("NJF POS 本体", "78000", "1");
      addDeviceCard("レシートプリンタ", "28000", "1");
    }
    updatePreview();
  </script>
</body>
</html>
